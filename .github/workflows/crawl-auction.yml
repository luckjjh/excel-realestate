name: Crawl Court Auction

on:
  schedule:
    # 매일 06:00, 18:00 KST (UTC 21:00, 09:00)
    - cron: "0 21 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      sidos:
        description: "크롤링 대상 시도코드 (쉼표 구분, 비우면 전체)"
        required: false
        default: ""

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run auction crawler
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          AUCTION_SIDOS: ${{ github.event.inputs.sidos }}
        run: node scripts/crawl-auction.js
